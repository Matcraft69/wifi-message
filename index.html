<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Moderne - Google Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    :root { --primary: #00a884; --bg: #111b21; --msg-bg: #202c33; --self: #005c4b; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
    #auth { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
    #chat { display: none; flex:1; flex-direction: column; }
    #messages { flex:1; overflow-y: auto; padding: 16px; }
    .msg { margin: 8px 0; padding: 10px 14px; border-radius: 12px; max-width: 75%; word-wrap: break-word; }
    .msg.self { background: var(--self); margin-left: auto; }
    .msg.other { background: var(--msg-bg); }
    #input-area { display: flex; padding: 12px; background: #202c33; }
    #message { flex:1; background: #2a3942; border: none; color: white; padding: 12px; border-radius: 24px; margin-right: 8px; }
    button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 24px; cursor: pointer; }
    header { background: #111b21; padding: 12px; text-align: center; font-weight: bold; }
    #user { position: absolute; top: 12px; right: 16px; font-size: 0.9rem; opacity: 0.8; }
  </style>
</head>
<body>

  <div id="auth">
    <h2>Chat sécurisé avec Google</h2>
    <button id="google-login">Se connecter avec Google</button>
  </div>

  <div id="chat">
    <header>Chat en temps réel <span id="user"></span></header>
    <div id="messages"></div>
    <div id="input-area">
      <input id="message" placeholder="Écris un message..." autocomplete="off"/>
      <button id="send">Envoyer</button>
    </div>
  </div>

  <script>
    // Remplace par TES vraies config Firebase (crée un projet sur console.firebase.google.com)
    const firebaseConfig = {
      apiKey: "AIzaSy...ta-clef-api-ici...",
      authDomain: "ton-projet.firebaseapp.com",
      projectId: "ton-projet",
      storageBucket: "ton-projet.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const loginBtn = document.getElementById('google-login');
    const chatDiv = document.getElementById('chat');
    const authDiv = document.getElementById('auth');
    const userSpan = document.getElementById('user');
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('message');
    const sendBtn = document.getElementById('send');

    // Connexion Google
    loginBtn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .catch(err => alert("Erreur : " + err.message));
    });

    // Écoute l'état de connexion
    auth.onAuthStateChanged(user => {
      if (user) {
        authDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
        userSpan.textContent = `Connecté : ${user.displayName || user.email}`;

        // Charger + écouter les messages en temps réel
        db.collection('messages')
          .orderBy('createdAt', 'asc')
          .onSnapshot(snapshot => {
            messagesDiv.innerHTML = '';
            snapshot.forEach(doc => {
              const msg = doc.data();
              const div = document.createElement('div');
              div.className = `msg ${msg.uid === user.uid ? 'self' : 'other'}`;
              div.innerHTML = `<strong>${msg.name || 'Anonyme'} :</strong> ${msg.text}`;
              messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          });
      } else {
        authDiv.style.display = 'flex';
        chatDiv.style.display = 'none';
      }
    });

    // Envoyer message
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      const user = auth.currentUser;
      db.collection('messages').add({
        text,
        name: user.displayName || user.email.split('@')[0],
        uid: user.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      input.value = '';
    }
  </script>
</body>
</html>
